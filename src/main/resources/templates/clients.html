<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Список клиентов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Наши клиенты</h1>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-danger btn-sm">Выйти из системы</button>
    </form>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title mb-3">База данных клиентов</h5>

        <table class="table table-hover mt-3">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>ФИО</th>
                <th>Email</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="client : ${clients}">
                <td th:text="${client.id}"></td>
                <td th:text="${client.fullName}"></td>
                <td th:text="${client.email}"></td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${client.status}">Активен</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clients)}">
                <td colspan="4" class="text-center">Список клиентов пуст</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="mt-4">
    <a th:href="@{/}" class="btn btn-secondary">На главную</a>
    <a th:href="@{/reports}" class="btn btn-primary">Перейти к отчетам</a>
</div>

</body>
</html>
