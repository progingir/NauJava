<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
<h2>Вход в систему</h2>

<div th:if="${param.error}" style="color: red;">
    <p>Неверное имя пользователя или пароль.</p>
</div>
<div th:if="${param.logout}" style="color: green;">
    <p>Вы успешно вышли из системы.</p>
</div>

<form th:action="@{/login}" method="post">
    <div>
        <label>Имя пользователя: <input type="text" name="username" required/></label>
    </div>
    <br>
    <div>
        <label>Пароль: <input type="password" name="password" required/></label>
    </div>
    <br>
    <div>
        <input type="submit" value="Войти"/>
    </div>
</form>

<br>
<a th:href="@{/registration}">Регистрация</a>
</body>
</html>
