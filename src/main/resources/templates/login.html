<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card shadow login-card">
    <div class="card-body">
        <h2 class="card-title text-center mb-4">Вход</h2>

        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            Неверное имя пользователя или пароль.
        </div>
        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            Вы успешно вышли из системы.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Введите логин" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Введите пароль" required>
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Войти</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted">Нет аккаунта?</span>
            <a th:href="@{/registration}" class="text-decoration-none">Зарегистрироваться</a>
        </div>
    </div>
</div>

</body>
</html>
