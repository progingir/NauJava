<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reg-card { width: 100%; max-width: 450px; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card shadow reg-card">
    <div class="card-body">
        <h2 class="card-title text-center mb-4">Регистрация</h2>

        <div th:if="${message}" class="alert alert-warning" role="alert" th:text="${message}"></div>

        <form th:action="@{/registration}" th:object="${userDto}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Логин</label>
                <input type="text" id="username" th:field="*{username}"
                       class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                       placeholder="Придумайте логин">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" th:field="*{password}"
                       class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                       placeholder="Минимум 4 символа">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-success">Создать аккаунт</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted">Уже есть профиль?</span>
            <a th:href="@{/login}" class="text-decoration-none">Войти в систему</a>
        </div>
    </div>
</div>

</body>
</html>
