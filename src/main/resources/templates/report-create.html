<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание отчета</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5 text-center">
<div class="card shadow p-4">
    <h2>Генерация нового отчета</h2>
    <p class="text-muted">Отчет будет сформирован асинхронно. Вы будете перенаправлены на страницу ожидания.</p>

    <form th:action="@{/reports/generate}" method="post">
        <div class="mt-4">
            <a th:href="@{/reports}" class="btn btn-secondary">Отмена</a>
            <button type="submit" class="btn btn-success">Запустить генерацию</button>
        </div>
    </form>
</div>
</body>
</html>
