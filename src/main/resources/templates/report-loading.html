<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="refresh" content="3">
    <meta charset="UTF-8">
    <title>Формирование отчета</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="loader"></div>

<h2 th:text="${statusInfo}">Статус...</h2>

<p class="text-muted">Пожалуйста, подождите. Страница обновится автоматически, когда отчет будет готов.</p>

<br>
<a href="/reports" class="btn btn-outline-secondary">Вернуться в панель управления</a>
</body>
</html>
