<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Панель отчетов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Панель управления отчетами</h1>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-danger btn-sm">Выйти</button>
    </form>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title">Список ваших отчетов</h5>
        <p class="text-muted">Пользователь: <span sec:authentication="name">Имя</span></p>

        <table class="table table-hover mt-3">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Дата создания</th>
                <th>Статус</th>
                <th>Действие</th> </tr>
            </thead>
            <tbody>
            <tr th:each="report : ${reports}">
                <td th:text="${report.id}">1</td>
                <td th:text="${report.name}">Название отчета</td>
                <td th:text="${#temporals.format(report.createdAt, 'dd.MM.yyyy HH:mm')}">07.04.2026</td>
                <td>
                    <span th:class="${report.status.name() == 'COMPLETED'} ? 'badge bg-success' : 'badge bg-warning'"
                          th:text="${report.status}">Статус</span>
                </td>
                <td>
                    <a th:href="@{/reports/view/{id}(id=${report.id})}" class="btn btn-sm btn-outline-primary">Открыть</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(reports)}">
                <td colspan="5" class="text-center">Отчетов пока нет</td> </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="mt-4">
    <a href="/" class="btn btn-secondary">На главную</a>
    <a th:href="@{/reports/create}" class="btn btn-primary">Создать новый отчет</a>
</div>

</body>
</html>
